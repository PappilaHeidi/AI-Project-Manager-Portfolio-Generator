site_name: 'AI Project Manager & Portfolio Generator'
site_url: 'https://pappilaheidi.github.io/AI-Project-Manager-Portfolio-Generator/'

docs_dir: docs

theme:
  name: 'material'

markdown_extensions:
  # Footnotes
  - footnotes
  # Code blocks
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # Emojis
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Checkboxes
  - pymdownx.tasklist:
      custom_checkbox: true
  # Admonitions
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  # Navigation page ordering
  - awesome-nav
  - search

copyright: |
  Heidi Pappila, Joni Kauppinen in 2026.