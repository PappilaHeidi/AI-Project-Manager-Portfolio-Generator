services:
  github-service:
    build:
      context: .
      dockerfile: ./services/github-service/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DATABASE_PATH=/app/database/app.db
    volumes:
      - ./database:/app/database
      - ./shared:/app/shared
    networks:
      - app-network

  analysis-service:
    build:
      context: .
      dockerfile: ./services/analysis-service/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DATABASE_PATH=/app/database/app.db
    volumes:
      - ./database:/app/database
      - ./shared:/app/shared
    depends_on:
      - github-service
    networks:
      - app-network

  documentation-service:
    build:
      context: .
      dockerfile: ./services/docs-service/Dockerfile
    ports:
      - "8003:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_PATH=/app/database/app.db
    volumes:
      - ./database:/app/database
      - ./shared:/app/shared
    depends_on:
      - github-service
      - analysis-service
    networks:
      - app-network

  portfolio-service:
    build:
      context: .
      dockerfile: ./services/portfolio-service/Dockerfile
    ports:
      - "8004:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_PATH=/app/database/app.db
    volumes:
      - ./database:/app/database
      - ./shared:/app/shared
    depends_on:
      - github-service
      - analysis-service
    networks:
      - app-network
    
  streamlit-service:
    build:
      context: ./services/streamlit
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - github-service
      - analysis-service
      - documentation-service
      - portfolio-service
    environment:
      - GITHUB_SERVICE_URL=http://github-service:8000
      - ANALYSIS_SERVICE_URL=http://analysis-service:8000
      - DOCS_SERVICE_URL=http://documentation-service:8000
      - PORTFOLIO_SERVICE_URL=http://portfolio-service:8000
    volumes:
      - ./services/streamlit:/app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge